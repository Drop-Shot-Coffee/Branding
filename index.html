<style>

  .buildbar{position:sticky;bottom:0;z-index:25;margin:30px -26px -90px;padding:18px 26px 22px;background:linear-gradient(180deg,rgba(244,239,230,0),var(--cream) 32%);display:flex;flex-direction:column;align-items:center;gap:10px}
  .build-status{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.04em;color:var(--ink-soft);text-align:center}

  .ctx-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--agreed);margin-bottom:9px;display:flex;align-items:center;gap:7px}

  .ctx-item .ctx-q{font-weight:600;color:var(--court-deep);display:block;font-size:11.5px;letter-spacing:.02em;margin-bottom:1px}
  .ctx-item.empty{color:#b3aa9a;font-style:italic}.ctx-item.empty::before{background:#ccc}
  .art{background:var(--paper);border:1px solid var(--line);border-radius:16px;margin-bottom:22px;overflow:hidden;box-shadow:var(--shadow)}
  .art-head{padding:22px 26px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(236,228,214,.4),transparent)}
  .art-num{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;color:var(--clay);margin-bottom:9px;display:flex;align-items:center;gap:10px}

  .locked-panel,.stub-panel{text-align:center;padding:74px 20px;color:var(--ink-soft)}

  .mv-item{margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--line)}.mv-item:last-child{border-bottom:none}
  .mv-q{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--clay);margin-bottom:5px}
  .mv-title{font-weight:600;color:var(--court-deep);font-size:14.5px;margin-bottom:7px}

  @media (max-width:760px){.answers{grid-template-columns:1fr}.tabhead{flex-direction:column}main{padding:24px 16px 80px}.buildbar{margin:24px -16px -80px;padding:16px}}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}html{scroll-behavior:auto}}
</style>

async function doLogin(){
  const email=$("#email").value.trim(),password=$("#password").value,err=$("#loginErr");err.textContent="";
  if(!email||!password){err.textContent="Enter your email and password.";return;}
  $("#loginBtn").textContent="Signing in\u2026";$("#loginBtn").disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password});
  $("#loginBtn").textContent="Sign in";$("#loginBtn").disabled=false;
  if(error){err.textContent=error.message;return;}
  await boot(data.user);
}
async function boot(user){
  const{data:roleRow,error}=await sb.from("user_roles").select("role,display_name").eq("user_id",user.id).single();
  if(error||!roleRow){await sb.auth.signOut();$("#loginErr").textContent="No role assigned to this account. Please contact Tarek.";return;}
  CURRENT={user,role:roleRow.role,author:ROLE_TO_AUTHOR[roleRow.role]||null,display:roleRow.display_name};
  $("#login").classList.add("hidden");$("#app").classList.remove("hidden");
  renderWhoami();renderTabs();await refreshVersions();selectTab("discovery");startPolling();
}

/* ===== TABS ===== */
function renderTabs(){
  const bar=$("#tabbar");bar.innerHTML="";
  TABS.forEach(t=>{
    const isLockedPos=(t.key==="positioning"&&!LATEST_VERSION);
    const b=document.createElement("button");
    b.className="tab"+(t.built?"":" stub")+(isLockedPos?" locked":"")+(t.key===activeTab?" active":"");
    let pill=t.built?(isLockedPos?' <span class="pill">locked</span>':""):' <span class="pill">soon</span>';
    b.innerHTML='<span class="n">'+t.n+'</span>'+t.label+pill;
    b.addEventListener("click",()=>{
      if(isLockedPos){toast("Positioning unlocks once Discovery is locked & built.");selectTab("discovery");return;}
      selectTab(t.key);
    });
    bar.appendChild(b);
  });
}
function selectTab(key){
  activeTab=key;renderTabs();const tab=TABS.find(t=>t.key===key);
  if(key==="discovery")renderDiscovery();else if(key==="positioning")renderPositioning();else renderStub(tab);
  window.scrollTo({top:0,behavior:"smooth"});
}

function buildQuestion(q,idx){
  const wrap=document.createElement("div");wrap.className="q";wrap.id="q-"+q.key;
  const samplesHtml=q.samples.map(s=>'<p class="sn">'+s+'</p>').join("")+(q.tension?'<div class="tension">\u2696\ufe0e '+q.tension+'</div>':"");
  wrap.innerHTML=
   '<div class="q-head"><div class="q-num">Q'+(idx+1)+' <span class="chip">'+q.chip+'</span></div>'
   +'<div class="q-title">'+q.title+'</div><div class="q-prompt">'+q.prompt+'</div></div>'
   +'<details class="samples"><summary>Sample answers &mdash; strawmen to react to</summary><div class="sbody">'+samplesHtml+'</div></details>'
   +'<div class="answers">'+povBox(q.key,"tarek")+povBox(q.key,"karim")+'</div>'
   +'<div class="agreed-wrap">'+agreedBox(q.key)+'</div>';
  setTimeout(()=>{wireBox(q.key,"tarek");wireBox(q.key,"karim");wireBox(q.key,"agreed");},0);

function wireBox(qkey,author){
  const canEdit=(author==="agreed")?(CURRENT.author==="tarek"||CURRENT.author==="karim"):(CURRENT.author===author);
  if(!canEdit)return;
  const ed=document.getElementById("ed-"+qkey+"-"+author),toolbar=document.querySelector('.toolbar[data-for="'+qkey+'-'+author+'"]'),saveBtn=document.getElementById("save-"+qkey+"-"+author);
  if(!ed||!toolbar)return;
  toolbar.querySelectorAll(".tb[data-cmd]").forEach(btn=>{
    btn.addEventListener("mousedown",e=>e.preventDefault());
    btn.addEventListener("click",()=>{ed.focus();document.execCommand(btn.dataset.cmd,false,btn.dataset.arg||null);markDirty(qkey,author);});
  });
  ed.addEventListener("keydown",e=>{if(e.key==="Tab"){e.preventDefault();document.execCommand(e.shiftKey?"outdent":"indent",false,null);markDirty(qkey,author);}});
  ed.addEventListener("input",()=>markDirty(qkey,author));
  saveBtn.addEventListener("click",()=>saveAnswer("discovery",qkey,author));
}
function markDirty(qkey,author){const btn=document.getElementById("save-"+qkey+"-"+author);if(btn){btn.textContent="Save";btn.classList.remove("saved");btn.disabled=false;}}

/* ===== READ / WRITE ===== */
async function loadDiscovery(){
  const{data,error}=await sb.from("brand_strategy_responses").select("question_key,author,content_html,content_text,updated_at").eq("tab","discovery");
  if(error){toast("Couldn't load Discovery.");return;}
  RESPONSES={};(data||[]).forEach(r=>{RESPONSES[r.question_key]=RESPONSES[r.question_key]||{};RESPONSES[r.question_key][r.author]=r;});
  paintDiscovery();updateBuildStatus();
}
function paintDiscovery(){
  DISCOVERY.questions.forEach(q=>{
    ["tarek","karim","agreed"].forEach(author=>{
      const r=RESPONSES[q.key]&&RESPONSES[q.key][author],ed=document.getElementById("ed-"+q.key+"-"+author),stamp=document.getElementById("stamp-"+q.key+"-"+author);
      if(!ed)return;
      const canEdit=(author==="agreed")?(CURRENT.author==="tarek"||CURRENT.author==="karim"):(CURRENT.author===author);
      if(canEdit&&document.activeElement===ed)return;
      const html=r?r.content_html:"";if(ed.innerHTML!==html)ed.innerHTML=html;
      if(stamp)stamp.textContent=r?"saved "+timeAgo(r.updated_at):"";
    });
  });
}
async function saveAnswer(tab,qkey,author){
  const ed=document.getElementById("ed-"+qkey+"-"+author),btn=document.getElementById("save-"+qkey+"-"+author);
  const html=ed.innerHTML.trim(),text=ed.innerText.trim();
  btn.textContent="Saving\u2026";btn.disabled=true;
  const row={tab,question_key:qkey,author,user_id:CURRENT.user.id,content_html:html,content_text:text};
  const{error}=await sb.from("brand_strategy_responses").upsert(row,{onConflict:"tab,question_key,author"});
  if(error){btn.textContent="Save";btn.disabled=false;toast("Save failed: "+error.message);return;}
  btn.textContent="Saved \u2713";btn.classList.add("saved");
  const store=tab==="discovery"?RESPONSES:POS_RESPONSES;
  store[qkey]=store[qkey]||{};store[qkey][author]={question_key:qkey,author,content_html:html,content_text:text,updated_at:new Date().toISOString()};
  const stamp=document.getElementById("stamp-"+qkey+"-"+author);if(stamp)stamp.textContent="saved just now";
  if(tab==="discovery")updateBuildStatus();
  toast("Saved.");
}
/* ===== BUILD POSITIONING (two-phase gate + versioning) ===== */
function agreedFilledCount(){
  return DISCOVERY.questions.filter(q=>{const a=RESPONSES[q.key]&&RESPONSES[q.key].agreed;return a&&a.content_text&&a.content_text.trim().length>0;}).length;
}
function updateBuildStatus(){
  const status=$("#buildStatus"),btn=$("#buildBtn");if(!status||!btn)return;
  const filled=agreedFilledCount(),total=DISCOVERY.questions.length,firstBuildDone=!!LATEST_VERSION;
  if(!firstBuildDone){
    const ok=filled===total;btn.disabled=!ok;
    status.innerHTML=ok?'All <b>'+total+'/'+total+'</b> Agreed answers complete &mdash; ready for the first build.'
      :'First build needs all Agreed answers: <b>'+filled+'/'+total+'</b> done. Fill the rest to unlock Positioning.';
    btn.querySelector("span").textContent="Lock Discovery & build Positioning";
  }else{
    btn.disabled=filled===0;
    status.innerHTML='Positioning is live (v'+LATEST_VERSION.version_number+'). Update any Agreed answer and re-sync &mdash; <b>'+filled+'/'+total+'</b> currently filled.';
    btn.querySelector("span").textContent="Re-sync Positioning from Discovery";
  }
}
async function buildPositioning(){
  const filled=agreedFilledCount(),total=DISCOVERY.questions.length;
  if(!LATEST_VERSION&&filled<total){toast("First build needs all 8 Agreed answers.");return;}
  if(filled===0){toast("Nothing agreed yet to build from.");return;}
  const snapshot={};DISCOVERY.questions.forEach(q=>{const a=RESPONSES[q.key]&&RESPONSES[q.key].agreed;snapshot[q.key]=a?a.content_html:"";});
  const nextNum=(LATEST_VERSION?LATEST_VERSION.version_number:0)+1;
  const btn=$("#buildBtn");btn.disabled=true;btn.querySelector("span").textContent="Syncing\u2026";
  const{error}=await sb.from("positioning_versions").insert({version_number:nextNum,snapshot,pushed_by:CURRENT.author,pushed_by_name:AUTHORS[CURRENT.author].label});
  if(error){toast("Build failed: "+error.message);updateBuildStatus();return;}

function buildArtifact(art,idx,snapshot){

      :'<div class="ctx-item empty"><span class="ctx-q">'+q.chip+' \u2014 \u201c'+q.title+'\u201d</span>Not answered in this version.</div>';
  }).join("");
  const canEdit=CURRENT.author==="tarek"||CURRENT.author==="karim";

   '<div class="art-head"><div class="art-num">P'+(idx+1)+' <span class="chip">'+art.chip+'</span></div>'
   +'<div class="art-title">'+art.title+'</div><div class="art-prompt">'+art.prompt+'</div>'

   +'</div></div>';

function wirePosBox(artkey){

}

/* ===== EXPORT ===== */
function stripHtml(html){const d=document.createElement("div");d.innerHTML=html||"";return d.innerText.trim();}
function get(store,key,author){return(store[key]&&store[key][author])?store[key][author].content_html:"";}
function gatherTab(tabKey){
  if(tabKey==="discovery"){
    return{title:"Discovery",kind:"discovery",questions:DISCOVERY.questions.map((q,i)=>({n:i+1,chip:q.chip,title:q.title,prompt:q.prompt,
      tarek:get(RESPONSES,q.key,"tarek"),karim:get(RESPONSES,q.key,"karim"),agreed:get(RESPONSES,q.key,"agreed")}))};
  }
  if(tabKey==="positioning"){
    if(!LATEST_VERSION)return null;
    return{title:"Positioning",kind:"positioning",version:LATEST_VERSION.version_number,questions:POSITIONING.artifacts.map((a,i)=>({
      n:i+1,chip:a.chip,title:a.title,prompt:a.prompt,template:a.template,agreed:get(POS_RESPONSES,a.key,"agreed"),
      ctx:a.ctx.map(qk=>({q:DISCOVERY.questions.find(x=>x.key===qk),html:LATEST_VERSION.snapshot[qk]||""}))}))};
  }
  return null;
}
function tabToMarkdown(d){
  let md="# Drop Shot Coffee \u2014 Brand Strategy\n## "+d.title+(d.version?" (v"+d.version+")":"")+"\n\n";
  d.questions.forEach(q=>{
    md+="### "+(d.kind==="positioning"?"P":"Q")+q.n+" \u00b7 "+q.chip+"\n**"+q.title+"**\n\n_"+q.prompt+"_\n\n";
    if(q.template)md+="> Template: "+q.template+"\n\n";
    if(d.kind==="discovery"){
      md+="**Tarek:**\n\n"+(stripHtml(q.tarek)||"_(no answer)_")+"\n\n**Karim:**\n\n"+(stripHtml(q.karim)||"_(no answer)_")+"\n\n**Agreed:**\n\n"+(stripHtml(q.agreed)||"_(no answer)_")+"\n\n---\n\n";
    }else{
      if(q.ctx&&q.ctx.length){md+="_From agreed discovery:_\n";q.ctx.forEach(c=>{md+="- **"+c.q.chip+":** "+(stripHtml(c.html)||"(not answered)")+"\n";});md+="\n";}
      md+="**Drop Shot's answer:**\n\n"+(stripHtml(q.agreed)||"_(no answer)_")+"\n\n---\n\n";
    }
  });
  return md;
}
function exportMd(d,fn){saveAs(new Blob([tabToMarkdown(d)],{type:"text/markdown;charset=utf-8"}),fn+".md");}
function richToDocxParas(html,dx){
  const P=dx.Paragraph,T=dx.TextRun,c=document.createElement("div");c.innerHTML=html||"";const paras=[];
  function runs(node){const r=[];node.childNodes.forEach(ch=>{
    if(ch.nodeType===3){if(ch.textContent)r.push(new T({text:ch.textContent}));}
    else if(ch.nodeType===1){const t=ch.textContent||"",bold=/^(B|STRONG)$/.test(ch.tagName),ital=/^(I|EM)$/.test(ch.tagName),und=/^U$/.test(ch.tagName);
      if(t)r.push(new T({text:t,bold,italics:ital,underline:und?{}:undefined}));}});
    return r.length?r:[new T({text:node.textContent||""})];}
  if(!c.childNodes.length)return[new P({children:[new T({text:"(no answer)",italics:true,color:"888888"})]})];
  c.childNodes.forEach(node=>{
    if(node.nodeType===3){if(node.textContent.trim())paras.push(new P({children:[new T({text:node.textContent.trim()})]}));return;}
    const tag=node.tagName;
    if(tag==="UL"||tag==="OL")node.querySelectorAll("li").forEach(li=>paras.push(new P({children:runs(li),bullet:{level:0}})));
    else if(/^H[1-6]$/.test(tag))paras.push(new P({children:[new T({text:node.textContent,bold:true,size:26})],spacing:{before:120,after:60}}));
    else paras.push(new P({children:runs(node)}));
  });
  return paras;
}
async function exportDocx(d,fn){
  const dx=window.docx,Doc=dx.Document,Pk=dx.Packer,P=dx.Paragraph,T=dx.TextRun,BS=dx.BorderStyle,ch=[];
  ch.push(new P({children:[new T({text:"Drop Shot Coffee",bold:true,size:20,color:"2f5d50"})]}));
  ch.push(new P({children:[new T({text:d.title+(d.version?" (v"+d.version+")":"")+" \u2014 Brand Strategy",bold:true,size:40,color:"1f3f37"})],spacing:{after:80}}));
  ch.push(new P({children:[new T({text:"Exported "+new Date().toLocaleString(),italics:true,size:18,color:"888888"})],spacing:{after:240}}));
  d.questions.forEach(q=>{
    ch.push(new P({children:[new T({text:(d.kind==="positioning"?"P":"Q")+q.n+" \u00b7 "+q.chip,bold:true,size:20,color:"c75d3c"})],spacing:{before:200,after:30}}));
    ch.push(new P({children:[new T({text:q.title,bold:true,size:28,color:"1f3f37"})],spacing:{after:20}}));
    ch.push(new P({children:[new T({text:q.prompt,italics:true,size:20,color:"5b574e"})],spacing:{after:q.template?60:120}}));
    if(q.template)ch.push(new P({children:[new T({text:q.template,size:18,color:"2f5d50"})],spacing:{after:120}}));
    if(d.kind==="discovery"){
      [["Tarek","2f5d50","tarek"],["Karim","c75d3c","karim"],["Agreed","7a6a3f","agreed"]].forEach(p=>{
        ch.push(new P({children:[new T({text:p[0],bold:true,size:22,color:p[1]})],spacing:{before:90,after:16}}));
        richToDocxParas(q[p[2]],dx).forEach(x=>ch.push(x));});
    }else{
      if(q.ctx&&q.ctx.length){
        ch.push(new P({children:[new T({text:"From agreed discovery",bold:true,size:18,color:"7a6a3f"})],spacing:{before:80,after:10}}));
        q.ctx.forEach(c=>ch.push(new P({children:[new T({text:c.q.chip+": ",bold:true,size:18,color:"5b574e"}),new T({text:stripHtml(c.html)||"(not answered)",size:18,color:"5b574e"})],bullet:{level:0}})));
      }
      ch.push(new P({children:[new T({text:"Drop Shot's answer",bold:true,size:22,color:"1f3f37"})],spacing:{before:100,after:16}}));
      richToDocxParas(q.agreed,dx).forEach(x=>ch.push(x));
    }
    ch.push(new P({text:"",border:{bottom:{color:"d8cfbf",space:1,style:BS.SINGLE,size:6}},spacing:{before:160,after:160}}));
  });
  const blob=await Pk.toBlob(new Doc({sections:[{properties:{},children:ch}]}));saveAs(blob,fn+".docx");
}
function povPrint(lbl,col,html){return '<div style="background:#f4efe6;border-left:3px solid '+col+';padding:9px 13px;margin-bottom:7px"><div style="font-size:11px;font-weight:bold;color:'+col+';font-family:Arial;margin-bottom:3px;text-transform:uppercase">'+lbl+'</div><div style="font-size:14px">'+(html||"<i style='color:#999'>No answer</i>")+'</div></div>';}

    if(q.template)h+='<div style="font-size:12px;color:#2f5d50;font-family:monospace;background:#fff;border:1px dashed #d8cfbf;padding:8px 10px;margin-bottom:12px">'+q.template+'</div>';
    if(d.kind==="discovery"){h+=povPrint("Tarek","#2f5d50",q.tarek)+povPrint("Karim","#c75d3c",q.karim)+povPrint("Agreed","#7a6a3f",q.agreed);}
    else{
      if(q.ctx&&q.ctx.length){h+='<div style="background:#ece4d6;border-radius:8px;padding:10px 12px;margin-bottom:8px"><div style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#7a6a3f;font-family:Arial;margin-bottom:5px">From agreed discovery</div>';q.ctx.forEach(c=>h+='<div style="font-size:12px;color:#5b574e;margin-bottom:3px"><b>'+c.q.chip+':</b> '+(stripHtml(c.html)||"(not answered)")+'</div>');h+='</div>';}
      h+=povPrint("Drop Shot's answer","#1f3f37",q.agreed);

    h+='</div>';

  w.innerHTML=h;return w;

function exportPdf(d,fn){

function stamp(){return new Date().toISOString().slice(0,10).replace(/-/g,"");}
function timeAgo(iso){if(!iso)return"";const s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return new Date(iso).toLocaleDateString();}
let toastT=null;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2600);}
